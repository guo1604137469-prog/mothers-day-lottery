<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>幸运抽奖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffeef5;
    font-family:"Microsoft YaHei";
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:720px;
    background:white;
    border-radius:30px;
    padding:30px 20px 40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    text-align:center;
}

.title{
    font-size:42px;
    font-weight:bold;
    color:#ff4f93;
    margin-bottom:25px;
}

select,
input{
    width:100%;
    padding:16px;
    margin-bottom:16px;
    border:none;
    border-radius:16px;
    background:#fff3f8;
    font-size:18px;
    outline:none;
}

.wheel-box{
    position:relative;
    width:560px;
    height:560px;
    margin:20px auto 30px;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    transition:transform 5s cubic-bezier(0.17,0.67,0.12,0.99);
    box-shadow:0 0 35px rgba(0,0,0,0.12);
}

.pointer{
    position:absolute;
    top:205px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:24px solid transparent;
    border-right:24px solid transparent;
    border-bottom:40px solid white;
    z-index:2;
}

.center-circle{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    background:#ff4f93;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
    font-weight:bold;
    z-index:3;
}

button{
    width:100%;
    border:none;
    border-radius:24px;
    padding:24px;
    background:#ff4f93;
    color:white;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.01);
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

@media(max-width:768px){

    .wheel-box{
        width:92vw;
        height:92vw;
        max-width:560px;
        max-height:560px;
    }

    .pointer{
        top:36%;
    }

    .center-circle{
        width:100px;
        height:100px;
        font-size:34px;
    }

    .title{
        font-size:32px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        🎁 幸运抽奖
    </div>

    <select id="className">
        <option value="">请选择班级</option>
        <option value="周二班">周二班</option>
        <option value="周六班">周六班</option>
    </select>

    <input
        type="text"
        id="studentName"
        placeholder="请输入学生姓名"
    >

    <div class="wheel-box">

        <div class="pointer"></div>

        <div class="center-circle">
            GO
        </div>

        <canvas
            id="wheel"
            width="560"
            height="560"
        ></canvas>

    </div>

    <button id="spinBtn">
        🎡 开始抽奖
    </button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwGxnDnGq0Bc7sFO22jlxdsMmuco1c72b767zwsiMBbZIG5PglfGmHihaT6MzzqNGnh/exec";

const prizes = [
    "宠物积分5",
    "宠物积分10",
    "学币888",
    "学币666",
    "学币88",
    "学币99"
];

const colors = [
    "#f8a8c8",
    "#ffd7e5",
    "#f59ac0",
    "#ffe4ee",
    "#f7a5c7",
    "#ffd3e4"
];

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

const center = 280;
const radius = 280;

function drawWheel(){

    const arc =
    Math.PI * 2 / prizes.length;

    for(let i=0;i<prizes.length;i++){

        const angle = i * arc;

        ctx.beginPath();

        ctx.moveTo(center,center);

        ctx.arc(
            center,
            center,
            radius,
            angle,
            angle + arc
        );

        ctx.fillStyle = colors[i];

        ctx.fill();

        ctx.save();

        ctx.translate(center,center);

        ctx.rotate(angle + arc/2);

        ctx.fillStyle = "#333";

        ctx.font =
        "bold 30px Microsoft YaHei";

        ctx.textAlign = "center";

        ctx.fillText(
            prizes[i],
            185,
            10
        );

        ctx.restore();
    }
}

drawWheel();

const wheel =
document.getElementById("wheel");

const btn =
document.getElementById("spinBtn");

let rotating = false;

btn.onclick = async ()=>{

    if(rotating) return;

    const className =
    document.getElementById("className").value;

    const studentName =
    document.getElementById("studentName").value.trim();

    if(!className){

        alert("请选择班级");

        return;
    }

    if(!studentName){

        alert("请输入姓名");

        return;
    }

    rotating = true;

    btn.disabled = true;

    const prizeIndex =
    Math.floor(
        Math.random() * prizes.length
    );

    const prize =
    prizes[prizeIndex];

    const eachDeg =
    360 / prizes.length;

    const rotateDeg =
        360 * 6 +
        (360 -
        prizeIndex * eachDeg -
        eachDeg / 2);

    wheel.style.transform =
    `rotate(${rotateDeg}deg)`;

    setTimeout(async ()=>{

        try{

            const response =
            await fetch(API_URL,{
                method:"POST",
                body:JSON.stringify({
                    className,
                    studentName,
                    prize
                })
            });

            const result =
            await response.json();

            if(result.success){

                alert(
                    `🎉 恭喜 ${studentName}\n获得：${prize}`
                );

            }else{

                alert(
        result.message || "您已参与过抽奖啦"
    );
            }

        }catch(error){

            console.log(error);

            alert("网络异常，请稍后重试");
        }

        rotating = false;

        btn.disabled = false;

    },5200);

};

</script>

</body>
</html>
