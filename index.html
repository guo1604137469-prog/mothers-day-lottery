<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>母亲节幸运抽奖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:"Microsoft YaHei",sans-serif;
  background:linear-gradient(135deg,#ffe8f3,#fff5f8);
  min-height:100vh;
  padding:20px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  border-radius:35px;
  padding:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  text-align:center;
  color:#ff4f8b;
  margin-bottom:10px;
  font-size:42px;
}

.subtitle{
  text-align:center;
  color:#888;
  margin-bottom:30px;
}

input,select{
  width:100%;
  padding:18px;
  border:3px solid #ffd1e1;
  border-radius:20px;
  margin-bottom:20px;
  font-size:18px;
  outline:none;
}

.wheel-wrap{
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:30px 0;
}

#wheel{
  width:650px;
  height:650px;
  border-radius:50%;
  background:
  conic-gradient(
    #ff9fc4 0deg 60deg,
    #ffd6e5 60deg 120deg,
    #ff9fc4 120deg 180deg,
    #ffd6e5 180deg 240deg,
    #ff9fc4 240deg 300deg,
    #ffd6e5 300deg 360deg
  );
  position:relative;
  transition:transform 5s cubic-bezier(.17,.67,.13,.99);
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.label{
  position:absolute;
  left:50%;
  top:50%;
  transform-origin:center;
  font-size:34px;
  color:#444;
  font-weight:bold;
}

.center{
  width:140px;
  height:140px;
  background:#ff4f8b;
  border-radius:50%;
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:10;

  display:flex;
  align-items:center;
  justify-content:center;

  color:white;
  font-size:28px;
  font-weight:bold;

  box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

.pointer{
  position:absolute;
  left:50%;
  top:132px;
  transform:translateX(-50%);
  width:0;
  height:0;

  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-bottom:38px solid white;

  z-index:5;
}

button{
  width:100%;
  padding:22px;
  border:none;
  border-radius:22px;
  background:#ff4f8b;
  color:white;
  font-size:28px;
  font-weight:bold;
  cursor:pointer;
  margin-top:30px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.02);
}

.result{
  margin-top:30px;
  text-align:center;
  font-size:32px;
  color:#ff4f8b;
  font-weight:bold;
}

@media(max-width:768px){

  .container{
    padding:20px;
  }

  #wheel{
    width:88vw;
    height:88vw;
  }

  .label{
    font-size:20px;
  }

  .center{
    width:90px;
    height:90px;
    font-size:22px;
  }

  .pointer{
    top:16vw;
  }

  h1{
    font-size:30px;
  }

  button{
    font-size:22px;
  }
}
</style>
</head>

<body>

<div class="container">

  <h1>🌸 母亲节幸运抽奖 🌸</h1>

  <div class="subtitle">
    祝所有妈妈母亲节快乐！
  </div>

  <select id="className">
    <option value="">请选择班级</option>
    <option>周二班</option>
    <option>周六班</option>
  </select>

  <input
    type="text"
    id="parentName"
    placeholder="请输入家长姓名"
  />

  <div class="wheel-wrap">

    <div class="pointer"></div>

    <div id="wheel">

      <div class="label" style="transform:translate(-50%,-50%) rotate(30deg) translateY(-250px) rotate(-30deg)">
        学币888
      </div>

      <div class="label" style="transform:translate(-50%,-50%) rotate(90deg) translateY(-250px) rotate(-90deg)">
        学币666
      </div>

      <div class="label" style="transform:translate(-50%,-50%) rotate(150deg) translateY(-250px) rotate(-150deg)">
        学币88
      </div>

      <div class="label" style="transform:translate(-50%,-50%) rotate(210deg) translateY(-250px) rotate(-210deg)">
        学币66
      </div>

      <div class="label" style="transform:translate(-50%,-50%) rotate(270deg) translateY(-250px) rotate(-270deg)">
        宠物积分5
      </div>

      <div class="label" style="transform:translate(-50%,-50%) rotate(330deg) translateY(-250px) rotate(-330deg)">
        宠物积分10
      </div>

      <div class="center">
        GO
      </div>

    </div>

  </div>

  <button onclick="startLottery()">
    🎡 开始抽奖
  </button>

  <div class="result" id="result"></div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyiwPBt1bYH-QCRLXnBgYoIOeajdlK8fKCiTkc-5-0OMgg3dHbZLBZgklaEdyvWj20g/exec";

const prizes = [
  "学币888",
  "学币666",
  "学币88",
  "学币66",
  "宠物积分5",
  "宠物积分10"
];

let rotating = false;
let currentRotate = 0;

async function startLottery(){

  if(rotating) return;

  const className =
    document.getElementById("className").value;

  const parentName =
    document.getElementById("parentName").value.trim();

  if(!className){
    alert("请选择班级");
    return;
  }

  if(!parentName){
    alert("请输入家长姓名");
    return;
  }

  rotating = true;

  try{

    // 查询是否已抽奖
    const checkRes =
      await fetch(API_URL + "?check=1");

    const list =
      await checkRes.json();

    const existed = list.find(item =>

      item.className === className &&
      item.parentName === parentName

    );

    if(existed){

      alert("您已经抽过奖啦～");

      rotating = false;

      return;
    }

    // 随机奖品
    const index =
      Math.floor(Math.random() * prizes.length);

    const prize = prizes[index];

    const deg = 360 / prizes.length;

    const targetDeg = index * deg;

    const finalDeg =
      360 * 6 +
      (360 - targetDeg - deg / 2);

    currentRotate += finalDeg;

    const wheel =
      document.getElementById("wheel");

    wheel.style.transform =
      `rotate(${currentRotate}deg)`;

    setTimeout(async ()=>{

      document.getElementById("result").innerHTML =
        `🎉 恭喜获得：${prize}`;

      // 上传中奖数据
      await fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
          className:className,
          parentName:parentName,
          prize:prize
        })
      });

      rotating = false;

    },5200);

  }catch(err){

    console.error(err);

    alert("网络异常，请稍后重试");

    rotating = false;

  }

}

</script>

</body>
</html>
