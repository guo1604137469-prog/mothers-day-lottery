<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母亲节幸运抽奖</title>

<style>
body{
    margin:0;
    font-family:"Microsoft YaHei",sans-serif;
    background:linear-gradient(135deg,#ffe08f,#fff6d5);
    padding:20px;
}

.card{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:30px;
    padding:30px;
    border:5px solid #ffb100;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#ff4f8b;
    font-size:48px;
}

.subtitle{
    text-align:center;
    color:#777;
    font-size:24px;
    margin-bottom:30px;
}

select,input{
    width:100%;
    padding:20px;
    border-radius:20px;
    border:3px solid #ffc3d8;
    font-size:28px;
    margin-bottom:20px;
    box-sizing:border-box;
}

.canvas-wrap{
    display:flex;
    justify-content:center;
    margin:30px 0;
}

canvas{
    max-width:100%;
}

button{
    width:100%;
    padding:22px;
    border:none;
    border-radius:25px;
    background:#ff4f8b;
    color:#fff;
    font-size:34px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.02);
}

.result{
    margin-top:25px;
    text-align:center;
    font-size:32px;
    color:#ff4f8b;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<h1>🌷 母亲节抽奖 🌷</h1>
<div class="subtitle">像 Scratch 一样快乐编程 ❤️</div>

<select id="className">
    <option>周二班</option>
    <option>周六班</option>
</select>

<input type="text" id="studentName" placeholder="请输入学生姓名">

<div class="canvas-wrap">
    <canvas id="wheel" width="420" height="420"></canvas>
</div>

<button onclick="startLottery()">🎡 开始抽奖</button>

<div class="result" id="result"></div>

</div>

<script>
const prizes = [
    "学币888",
    "学币666",
    "学币88",
    "学币66",
    "宠物积分5",
    "宠物积分10"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

function drawWheel(rotation = 0){

    ctx.clearRect(0,0,420,420);

    const centerX = 210;
    const centerY = 210;
    const radius = 170;

    const colors = ["#f49ac2","#f8d7e5"];

    const arc = Math.PI * 2 / prizes.length;

    for(let i=0;i<prizes.length;i++){

        const start = rotation + i * arc;
        const end = start + arc;

        ctx.beginPath();
        ctx.moveTo(centerX,centerY);
        ctx.arc(centerX,centerY,radius,start,end);
        ctx.fillStyle = colors[i%2];
        ctx.fill();

        ctx.save();
        ctx.translate(centerX,centerY);
        ctx.rotate(start + arc/2);

        ctx.fillStyle="#444";
        ctx.font="bold 22px Microsoft YaHei";
        ctx.textAlign="center";

        ctx.fillText(prizes[i],110,10);

        ctx.restore();
    }

    // 白色箭头（先画）
    ctx.beginPath();
    ctx.moveTo(210,145);
    ctx.lineTo(192,180);
    ctx.lineTo(228,180);
    ctx.closePath();
    ctx.fillStyle="white";
    ctx.fill();

    // GO圆（后画，盖住箭头一点）
    ctx.beginPath();
    ctx.arc(210,210,50,0,Math.PI*2);
    ctx.fillStyle="#ff4f8b";
    ctx.fill();

    // GO文字
    ctx.fillStyle="#fff";
    ctx.font="bold 24px Microsoft YaHei";
    ctx.textAlign="center";
    ctx.fillText("GO",210,220);
}

drawWheel();

function startLottery(){

    if(spinning) return;

    const className = document.getElementById("className").value;
    const studentName = document.getElementById("studentName").value.trim();

    if(!studentName){
        alert("请输入学生姓名");
        return;
    }

    const key = className + "_" + studentName;

    // 限制只能抽一次
    if(localStorage.getItem(key)){
        alert("你已经抽过奖啦！");
        return;
    }

    spinning = true;

    const resultIndex = Math.floor(Math.random() * prizes.length);

    const arc = 360 / prizes.length;

    const target =
        360 * 6 +
        (360 - resultIndex * arc - arc/2);

    let current = angle;

    const timer = setInterval(()=>{

        current += 12;

        angle = current;

        drawWheel(current * Math.PI / 180);

        if(current >= target){

            clearInterval(timer);

            spinning = false;

            const result = prizes[resultIndex];

            document.getElementById("result").innerHTML =
                "🎉 恭喜获得：" + result;

            // 记录抽奖
            localStorage.setItem(key,result);
        }

    },20);
}
</script>

</body>
</html>
