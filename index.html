<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>母亲节幸运抽奖</title>

<style>
body{
margin:0;
font-family:"Microsoft YaHei";
background:linear-gradient(135deg,#ffe08f,#fff6d5);
padding:20px;
}

.card{
max-width:1000px;
margin:auto;
background:#fff;
border-radius:30px;
padding:30px;
border:6px solid #ffb100;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#ff4f8b;
font-size:48px;
}

.subtitle{
text-align:center;
color:#666;
font-size:22px;
margin-bottom:30px;
}

select,input{
width:100%;
padding:20px;
border-radius:20px;
border:3px solid #ffc6d8;
font-size:26px;
margin-bottom:20px;
box-sizing:border-box;
}

.wheel-wrap{
position:relative;
width:700px;
height:700px;
margin:40px auto;
}

#wheel{
width:700px;
height:700px;
border-radius:50%;
background:conic-gradient(
#f7a3c4 0deg 60deg,
#ffe1ec 60deg 120deg,
#f7a3c4 120deg 180deg,
#ffe1ec 180deg 240deg,
#f7a3c4 240deg 300deg,
#ffe1ec 300deg 360deg
);
position:relative;
transition:transform 5s cubic-bezier(.17,.67,.25,1);
}

.label{
position:absolute;
left:50%;
top:50%;
transform-origin:center;
font-size:24px;
font-weight:bold;
color:#444;
}

.center{
position:absolute;
width:140px;
height:140px;
background:#ff4f8b;
border-radius:50%;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:10;
display:flex;
align-items:center;
justify-content:center;
font-size:52px;
font-weight:bold;
color:white;
box-shadow:0 0 20px rgba(0,0,0,.15);
}

.pointer{
position:absolute;
width:0;
height:0;
border-left:25px solid transparent;
border-right:25px solid transparent;
border-bottom:40px solid white;
left:50%;
top:230px;
transform:translateX(-50%);
z-index:5;
}

button{
width:100%;
padding:25px;
border:none;
border-radius:25px;
background:#ff4f8b;
color:white;
font-size:32px;
font-weight:bold;
cursor:pointer;
margin-top:30px;
}

.result{
text-align:center;
font-size:42px;
color:#ff4f8b;
font-weight:bold;
margin-top:30px;
}
</style>
</head>

<body>

<div class="card">

<h1>🌷 母亲节幸运抽奖 🌷</h1>
<div class="subtitle">完成作品即可参与抽奖 ❤️</div>

<select id="className">
<option>周二班</option>
<option>周六班</option>
</select>

<input id="studentName" placeholder="请输入学生姓名">

<div class="wheel-wrap">

<div id="wheel"></div>

<div class="pointer"></div>

<div class="center">GO</div>

</div>

<button onclick="spin()">🎡 开始抽奖</button>

<div class="result" id="result"></div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbyiwPBt1bYH-QCRLXnBgYoIOeajdlK8fKCiTkc-5-0OMgg3dHbZLBZgklaEdyvWj20g/exec";

const prizes=[
"学币888",
"学币666",
"学币88",
"学币66",
"宠物积分5",
"宠物积分10"
];

const wheel=document.getElementById("wheel");

const angles=[0,60,120,180,240,300];

prizes.forEach((p,i)=>{

const label=document.createElement("div");

label.className="label";

label.innerText=p;

label.style.transform=`
rotate(${angles[i]+30}deg)
translate(0,-280px)
rotate(-${angles[i]+30}deg)
`;

wheel.appendChild(label);

});

let spinning=false;

function spin(){

if(spinning)return;

const className=document.getElementById("className").value;

const studentName=document.getElementById("studentName").value.trim();

if(!studentName){
alert("请输入姓名");
return;
}

if(localStorage.getItem(studentName)){
alert("你已经抽过奖啦！");
return;
}

spinning=true;

const randomIndex=Math.floor(Math.random()*prizes.length);

const result=prizes[randomIndex];

const rotate=3600-randomIndex*60;

wheel.style.transform=`rotate(${rotate}deg)`;

setTimeout(()=>{

document.getElementById("result").innerHTML=`🎉 恭喜获得：${result}`;

localStorage.setItem(studentName,true);

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
className,
studentName,
prize:result
})
});

spinning=false;

},5200);

}

</script>

</body>
</html>
