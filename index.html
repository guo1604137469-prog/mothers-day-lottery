<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>母亲节幸运抽奖</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  background:
    linear-gradient(135deg,#ffe6f0,#ffd6eb);
  font-family:
    "PingFang SC",
    "Microsoft YaHei",
    sans-serif;

  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:720px;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(12px);
  border-radius:36px;
  padding:30px 20px 40px;
  box-shadow:0 15px 50px rgba(255,105,180,.18);
  text-align:center;
}

.title{
  font-size:38px;
  font-weight:900;
  color:#ff3f8e;
  margin-bottom:8px;
}

.sub{
  color:#666;
  margin-bottom:25px;
  font-size:16px;
}

.form{
  display:flex;
  gap:12px;
  margin-bottom:25px;
}

.form input,
.form select{
  flex:1;
  height:52px;
  border:none;
  border-radius:16px;
  padding:0 16px;
  font-size:16px;
  background:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
}

.wheel-wrap{
  position:relative;
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

.pointer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-78%);
  width:0;
  height:0;
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:38px solid #fff;
  z-index:2;
}

.center-circle{
  position:absolute;
  width:130px;
  height:130px;
  border-radius:50%;
  background:#ff3f8e;
  z-index:3;

  display:flex;
  justify-content:center;
  align-items:center;

  color:#fff;
  font-size:30px;
  font-weight:900;

  box-shadow:
    0 10px 25px rgba(255,62,142,.35);
}

canvas{
  width:100%;
  max-width:620px;
  height:auto;
  transition:transform 5s cubic-bezier(.17,.67,.2,1);
  filter:
    drop-shadow(0 18px 28px rgba(0,0,0,.12));
}

.btn{
  margin-top:40px;
  width:100%;
  height:72px;
  border:none;
  border-radius:24px;
  background:
    linear-gradient(135deg,#ff4f9f,#ff2d7d);

  color:#fff;
  font-size:30px;
  font-weight:900;
  cursor:pointer;

  box-shadow:
    0 10px 25px rgba(255,62,142,.3);

  transition:.2s;
}

.btn:active{
  transform:scale(.97);
}

.tip{
  margin-top:18px;
  color:#888;
  font-size:14px;
}

.result{
  margin-top:25px;
  font-size:30px;
  font-weight:900;
  color:#ff2d7d;
  min-height:40px;
}

@media(max-width:768px){

  .title{
    font-size:28px;
  }

  .form{
    flex-direction:column;
  }

  .btn{
    height:64px;
    font-size:24px;
  }

  .center-circle{
    width:100px;
    height:100px;
    font-size:24px;
  }

  .pointer{
    transform:translate(-50%,-74%);
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-bottom:30px solid #fff;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="title">💖 母亲节幸运抽奖 💖</div>

  <div class="sub">
    祝所有妈妈节日快乐～
  </div>

  <div class="form">
    <select id="className">
      <option value="">请选择班级</option>
      <option>周二班</option>
      <option>周六班</option>
    </select>

    <input
      type="text"
      id="studentName"
      placeholder="请输入学生姓名"
    />
  </div>

  <div class="wheel-wrap">

    <div class="pointer"></div>

    <canvas id="wheel" width="620" height="620"></canvas>

    <div class="center-circle">
      GO
    </div>

  </div>

  <button class="btn" id="spinBtn">
    🎡 开始抽奖
  </button>

  <div class="result" id="result"></div>

  <div class="tip">
    抽奖结果截图后发送给老师兑奖
  </div>

</div>

<script>

const prizes = [
  {
    text:"学币888",
    probability:2,
    color:"#f8d1e1"
  },
  {
    text:"二等奖：学币666",
    probability:3,
    color:"#f5a8c8"
  },
  {
    text:"三等奖：学币88",
    probability:15,
    color:"#f8d1e1"
  },
  {
    text:"四等奖：学币66",
    probability:20,
    color:"#f5a8c8"
  },
  {
    text:"宠物积分5",
    probability:35,
    color:"#f8d1e1"
  },
  {
    text:"宠物积分10",
    probability:25,
    color:"#f5a8c8"
  }
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const btn = document.getElementById("spinBtn");

const result = document.getElementById("result");

const total = prizes.length;

const arc = Math.PI * 2 / total;

let rotating = false;

drawWheel();


// ===== 绘制转盘 =====
function drawWheel(){

  const radius = canvas.width / 2;

  for(let i=0;i<total;i++){

    const angle = i * arc - Math.PI / 2 - arc / 2;

    ctx.beginPath();

    ctx.moveTo(radius,radius);

    ctx.arc(
      radius,
      radius,
      radius,
      angle,
      angle + arc
    );

    ctx.fillStyle = prizes[i].color;

    ctx.fill();

    ctx.save();

    ctx.translate(radius,radius);

    ctx.rotate(angle + arc/2);

    ctx.fillStyle="#222";

    ctx.font="bold 26px Microsoft YaHei";

    ctx.textAlign="center";

    ctx.fillText(
      prizes[i].text,
      radius*0.68,
      10
    );

    ctx.restore();
  }
}



// ===== 按概率抽奖 =====
function getRandomPrizeIndex(){

  const random = Math.random() * 100;

  let sum = 0;

  for(let i=0;i<prizes.length;i++){

    sum += prizes[i].probability;

    if(random <= sum){
      return i;
    }
  }

  return prizes.length - 1;
}



// ===== 开始抽奖 =====
btn.onclick = ()=>{

  if(rotating) return;

  const className =
    document.getElementById("className").value;

  const studentName =
    document.getElementById("studentName").value.trim();

  if(!className){
    alert("请选择班级");
    return;
  }

  if(!studentName){
    alert("请输入学生姓名");
    return;
  }

  rotating = true;

  result.innerHTML = "";

  const prizeIndex = getRandomPrizeIndex();

  const prize = prizes[prizeIndex];

  // 每块角度
  const perDeg = 360 / total;

  // 指针在正上方
  // 目标：让中奖块中心转到正上方
  const targetDeg =
    360 - (prizeIndex * perDeg + perDeg / 2);

  // 多转几圈
  const finalDeg =
    360 * 6 + targetDeg;

  canvas.style.transform =
    `rotate(${finalDeg}deg)`;

  setTimeout(()=>{

    result.innerHTML =
      `🎉 恭喜获得：${prize.text}`;

    rotating = false;

  },5200);

};

</script>

</body>
</html>
