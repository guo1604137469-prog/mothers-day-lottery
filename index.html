<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>母亲节幸运抽奖</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#ffe6f1,#fff5f8);
    font-family:"Microsoft YaHei";
    min-height:100vh;
    overflow-x:hidden;
    padding:20px;
}

.container{
    max-width:760px;
    margin:auto;
    background:white;
    border-radius:35px;
    padding:30px 20px 40px;
    box-shadow:0 10px 35px rgba(0,0,0,0.08);
    text-align:center;
}

.title{
    font-size:42px;
    color:#ff4f93;
    font-weight:bold;
    margin-bottom:10px;
}

.desc{
    color:#999;
    margin-bottom:25px;
    font-size:18px;
}

select,input{
    width:100%;
    padding:16px;
    margin-bottom:18px;
    border:none;
    border-radius:18px;
    background:#fff2f7;
    font-size:18px;
    outline:none;
}

.wheel-wrap{
    position:relative;
    width:620px;
    height:620px;
    margin:20px auto;
}

#wheel{
    width:100%;
    height:100%;
    border-radius:50%;
    transition:transform 5s cubic-bezier(.17,.67,.13,.99);
    box-shadow:0 0 35px rgba(0,0,0,0.12);
}

.pointer{
    position:absolute;
    top:228px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    border-left:24px solid transparent;
    border-right:24px solid transparent;
    border-bottom:42px solid white;
    z-index:2;
}

.center-circle{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    width:130px;
    height:130px;
    border-radius:50%;
    background:#ff4f93;
    z-index:3;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:38px;
    font-weight:bold;

    box-shadow:0 5px 18px rgba(0,0,0,0.15);
}

button{
    width:100%;
    padding:24px;
    border:none;
    border-radius:24px;
    background:#ff4f93;
    color:white;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.01);
}

button:disabled{
    opacity:0.6;
}

.result{
    margin-top:25px;
    font-size:34px;
    color:#ff4f93;
    font-weight:bold;
    min-height:50px;
}

.tip{
    margin-top:20px;
    color:#666;
    line-height:1.8;
    font-size:17px;
    background:#fff5fa;
    padding:18px;
    border-radius:18px;
}

.flower{
    position:fixed;
    top:-20px;
    font-size:22px;
    animation:fall linear forwards;
    pointer-events:none;
    z-index:999;
}

@keyframes fall{

    to{
        transform:
        translateY(110vh)
        rotate(360deg);

        opacity:0;
    }
}

@media(max-width:768px){

    .wheel-wrap{
        width:92vw;
        height:92vw;
    }

    .pointer{
        top:35%;
    }

    .center-circle{
        width:95px;
        height:95px;
        font-size:28px;
    }

    .title{
        font-size:30px;
    }

    button{
        font-size:26px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        💐 母亲节幸运抽奖 💐
    </div>

    <div class="desc">
        每位同学仅可参与一次哦～
    </div>

    <select id="className">
        <option value="">请选择班级</option>
        <option>周二班</option>
        <option>周六班</option>
    </select>

    <input
        type="text"
        id="studentName"
        placeholder="请输入姓名"
    >

    <div class="wheel-wrap">

        <div class="pointer"></div>

        <div class="center-circle">
            GO
        </div>

        <canvas
            id="wheel"
            width="620"
            height="620"
        ></canvas>

    </div>

    <button id="spinBtn">
        🎡 开始抽奖
    </button>

    <div class="result" id="result"></div>

    <div class="tip">
        🎁 抽奖完成后请截图中奖页面<br>
        并发送给老师领取奖励～
    </div>

</div>

<audio id="spinSound">
<source
src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"
type="audio/mpeg">
</audio>

<script>

const prizes = [
    "一等奖：学币888",
    "二等奖：学币666",
    "三等奖：学币88",
    "四等奖：学币66",
    "宠物积分5",
    "宠物积分10"
];

const colors = [
    "#f8a8c8",
    "#ffd8e5",
    "#f59bc1",
    "#ffe3ee",
    "#f7aacb",
    "#ffd4e4"
];

const canvas =
document.getElementById("wheel");

const ctx =
canvas.getContext("2d");

const center = 310;
const radius = 310;

function drawWheel(){

    const arc =
    Math.PI * 2 / prizes.length;

    for(let i=0;i<prizes.length;i++){

        const angle = i * arc;

        ctx.beginPath();

        ctx.moveTo(center,center);

        ctx.arc(
            center,
            center,
            radius,
            angle,
            angle + arc
        );

        ctx.fillStyle =
        colors[i];

        ctx.fill();

        ctx.save();

        ctx.translate(center,center);

        ctx.rotate(angle + arc/2);

        ctx.fillStyle="#333";

        ctx.font =
        "bold 28px Microsoft YaHei";

        ctx.textAlign="center";

        ctx.fillText(
            prizes[i],
            205,
            10
        );

        ctx.restore();
    }
}

drawWheel();

const btn =
document.getElementById("spinBtn");

const wheel =
document.getElementById("wheel");

const result =
document.getElementById("result");

const spinSound =
document.getElementById("spinSound");

let rotating = false;

btn.onclick = ()=>{

    if(rotating) return;

    const className =
    document.getElementById("className").value;

    const studentName =
    document.getElementById("studentName").value.trim();

    if(!className){

        alert("请选择班级");

        return;
    }

    if(!studentName){

        alert("请输入姓名");

        return;
    }

    // 本地限制一次
    const userKey =
    className + "_" + studentName;

    if(localStorage.getItem(userKey)){

        alert("您已经参与过抽奖啦～");

        return;
    }

    rotating = true;

    btn.disabled = true;

    spinSound.currentTime = 0;

    spinSound.play();

    const prizeIndex =
    Math.floor(Math.random() * prizes.length);

    const prize =
    prizes[prizeIndex];

    const eachDeg =
    360 / prizes.length;

    const rotateDeg =
        360 * 6 +
        (360 -
        prizeIndex * eachDeg -
        eachDeg / 2);

    wheel.style.transform =
    `rotate(${rotateDeg}deg)`;

    setTimeout(()=>{

        result.innerHTML =
        `🎉 恭喜获得：<br>${prize}`;

        localStorage.setItem(
            userKey,
            "1"
        );

        startFlowers();

        rotating = false;

        btn.disabled = false;

    },5200);
};

function startFlowers(){

    for(let i=0;i<35;i++){

        setTimeout(()=>{

            const flower =
            document.createElement("div");

            flower.className =
            "flower";

            flower.innerHTML =
            ["🌸","💖","🌺","✨"][Math.floor(Math.random()*4)];

            flower.style.left =
            Math.random()*100 + "vw";

            flower.style.animationDuration =
            (3 + Math.random()*3) + "s";

            document.body.appendChild(flower);

            setTimeout(()=>{

                flower.remove();

            },6000);

        },i * 120);
    }
}

</script>

</body>
</html>
