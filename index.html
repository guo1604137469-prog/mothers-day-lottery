<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>母亲节幸运抽奖</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#fff5f8;
    font-family:"Microsoft YaHei";
}

.container{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:30px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    color:#ff4f9a;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#999;
    margin-bottom:30px;
}

select,input{
    width:100%;
    padding:18px;
    margin-bottom:20px;
    border-radius:20px;
    border:3px solid #ffd1e2;
    font-size:20px;
    box-sizing:border-box;
}

.lottery-wrap{
    position:relative;
    width:700px;
    height:700px;
    margin:30px auto;
}

#wheel{
    width:700px;
    height:700px;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    transition:transform 5s cubic-bezier(0.17,0.67,0.18,1);
    box-shadow:0 0 30px rgba(255,105,180,0.3);
}

.slice{
    position:absolute;
    width:50%;
    height:50%;
    left:50%;
    top:50%;
    transform-origin:0% 0%;
    clip-path:polygon(0 0,100% 0,0 100%);
}

.slice span{
    position:absolute;
    left:35%;
    top:18%;
    transform:rotate(30deg);
    font-size:26px;
    font-weight:bold;
    color:#333;
}

.center{
    position:absolute;
    width:140px;
    height:140px;
    background:#ff4f9a;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:28px;
    font-weight:bold;
    z-index:10;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.pointer{
    position:absolute;
    width:0;
    height:0;
    border-left:22px solid transparent;
    border-right:22px solid transparent;
    border-bottom:40px solid #fff;
    left:50%;
    top:250px;
    transform:translateX(-50%);
    z-index:5;
}

button{
    width:100%;
    padding:22px;
    border:none;
    border-radius:22px;
    background:#ff4f9a;
    color:#fff;
    font-size:32px;
    font-weight:bold;
    cursor:pointer;
    margin-top:30px;
}

button:hover{
    opacity:0.9;
}

@media(max-width:768px){

    .lottery-wrap{
        width:320px;
        height:320px;
    }

    #wheel{
        width:320px;
        height:320px;
    }

    .center{
        width:80px;
        height:80px;
        font-size:18px;
    }

    .pointer{
        top:110px;
    }

    .slice span{
        font-size:16px;
    }

}

</style>
</head>

<body>

<div class="container">

<h1>💐 母亲节幸运抽奖 💐</h1>

<div class="subtitle">
每位同学仅可参与一次
</div>

<select id="classSelect">
    <option value="">请选择班级</option>
    <option>周二班</option>
    <option>周六班</option>
</select>

<input type="text" id="studentName" placeholder="请输入姓名"/>

<div class="lottery-wrap">

    <div id="wheel"></div>

    <div class="pointer"></div>

    <div class="center">GO</div>

</div>

<button id="startBtn">
🎡 开始抽奖
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyiwPBt1bYH-QCRLXnBgYoIOeajdlK8fKCiTkc-5-0OMgg3dHbZLBZgklaEdyvWj20g/exec";

const prizes = [
    "学币88",
    "学币666",
    "学币888",
    "宠物积分10",
    "宠物积分5",
    "学币99"
];

const colors = [
    "#f7a6c6",
    "#ffd9e7",
    "#f39ac0",
    "#ffe3ee",
    "#f5a4c8",
    "#ffe0ec"
];

const wheel = document.getElementById("wheel");

let currentRotate = 0;

function createWheel(){

    const count = prizes.length;
    const angle = 360 / count;

    for(let i=0;i<count;i++){

        const slice = document.createElement("div");

        slice.className = "slice";

        slice.style.background = colors[i];

        slice.style.transform = `rotate(${i * angle}deg) skewY(${90-angle}deg)`;

        const span = document.createElement("span");

        span.innerText = prizes[i];

        span.style.transform =
        `skewY(-${90-angle}deg) rotate(${angle/2}deg)`;

        slice.appendChild(span);

        wheel.appendChild(slice);
    }
}

createWheel();

const btn = document.getElementById("startBtn");

btn.onclick = startLottery;

async function startLottery(){

    const className =
    document.getElementById("classSelect").value;

    const studentName =
    document.getElementById("studentName").value.trim();

    if(!className){
        alert("请选择班级");
        return;
    }

    if(!studentName){
        alert("请输入姓名");
        return;
    }

    const userKey = className + "_" + studentName;

    if(localStorage.getItem(userKey)){
        alert("你已经抽过奖啦！");
        return;
    }

    btn.disabled = true;

    try{

        const res = await fetch(
            API_URL +
            "?check=1&class=" +
            encodeURIComponent(className) +
            "&name=" +
            encodeURIComponent(studentName)
        );

        const checkData = await res.json();

        if(checkData.exists){

            alert("该学生已经抽过奖！");

            btn.disabled = false;

            return;
        }

        const resultIndex =
        Math.floor(Math.random() * prizes.length);

        const prize = prizes[resultIndex];

        const anglePer = 360 / prizes.length;

        const rotateDeg =
        360 * 6 +
        (360 - resultIndex * anglePer - anglePer / 2);

        currentRotate = rotateDeg;

        wheel.style.transform =
        `rotate(${rotateDeg}deg)`;

        setTimeout(async()=>{

            try{

                await fetch(API_URL,{
                    method:"POST",
                    body:JSON.stringify({
                        className,
                        studentName,
                        prize,
                        time:new Date().toLocaleString()
                    })
                });

                localStorage.setItem(userKey,"1");

                alert("🎉 恭喜抽中：" + prize);

            }catch(e){

                alert("抽奖成功，但上传失败");

            }

            btn.disabled = false;

        },5200);

    }catch(err){

        alert("网络异常，请稍后重试");

        btn.disabled = false;
    }
}

</script>

</body>
</html>
